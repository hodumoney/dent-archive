<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}치과 구인글 아카이브{% endblock %}</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");

:root{
  --paper:#F6F7F9; --card:#FFFFFF; --ink:#181A1F; --muted:#6A7180;
  --line:#E6E9EF; --line2:#D3D8E0;
  --alarm:#E4483B;         /* 반복/삭제 경고 */
  --alarm-soft:#FCE9E7;
  --struct:#2C6E8F;        /* 구조/링크 */
  --ok:#3A9B6E;
  --mono:ui-monospace,"SF Mono",Menlo,"JetBrains Mono",monospace;
  --sans:"Pretendard Variable",Pretendard,system-ui,sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
  font-size:15px;line-height:1.5;letter-spacing:-.01em}
a{color:var(--struct);text-decoration:none}
a:hover{text-decoration:underline}

.wrap{max-width:960px;margin:0 auto;padding:0 20px 80px}

/* ── 헤더 ── */
header.top{border-bottom:2px solid var(--ink);margin-bottom:22px}
.top-in{max-width:960px;margin:0 auto;padding:22px 20px 16px;
  display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px}
.brand .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted)}
.brand h1{margin:0;font-size:23px;font-weight:800;letter-spacing:-.03em}
nav.tabs{display:flex;gap:4px}
nav.tabs a{font-size:13.5px;font-weight:600;color:var(--muted);
  padding:7px 13px;border-radius:8px}
nav.tabs a.on{color:var(--ink);background:var(--card);border:1px solid var(--line2)}

/* ── 요약 칩 ── */
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 16px;min-width:120px}
.chip .n{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}
.chip .l{font-size:12px;color:var(--muted);margin-top:5px}
.chip.warn .n{color:var(--alarm)}

/* ── 치과 카드 ── */
.clinic{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:18px 18px 14px;margin-bottom:14px}
.clinic-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
.clinic-id{display:flex;align-items:baseline;gap:10px;min-width:0}
.clinic-id .name{font-weight:700;font-size:16px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.clinic-id .kind{font-family:var(--mono);font-size:11px;color:var(--muted);
  border:1px solid var(--line2);border-radius:5px;padding:1px 6px}
.count{font-family:var(--mono);font-weight:700;font-size:14px;
  background:var(--alarm-soft);color:var(--alarm);border-radius:20px;
  padding:5px 12px;white-space:nowrap}
.count .x{font-weight:400;color:var(--muted);margin-left:6px}

/* ── 시그니처: 게시/삭제 타임라인 ── */
.timeline{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line2);
  overflow-x:auto}
.tl-track{display:flex;align-items:flex-start;gap:0;min-width:min-content}
.tl-node{display:flex;flex-direction:column;align-items:center;position:relative;
  flex:1 0 84px;text-align:center}
.tl-node::before{content:"";position:absolute;top:11px;left:-50%;width:100%;
  height:2px;background:var(--line2)}
.tl-node:first-child::before{display:none}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--struct);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:700;position:relative;z-index:1;
  border:3px solid var(--card)}
.tl-dot.del{background:var(--alarm)}
.tl-seq{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px}
.tl-date{font-size:11px;margin-top:2px;color:var(--ink)}
.tl-tag{font-size:10px;margin-top:2px;font-weight:600}
.tl-tag.del{color:var(--alarm)}
.tl-tag.live{color:var(--ok)}
.tl-node a{font-size:11px}

/* ── 테이블 ── */
table.posts{width:100%;border-collapse:collapse;background:var(--card);
  border:1px solid var(--line);border-radius:14px;overflow:hidden}
table.posts th,table.posts td{padding:11px 14px;text-align:left;
  border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
table.posts th{font-size:12px;color:var(--muted);font-weight:600;
  background:var(--paper);letter-spacing:.02em}
table.posts tr:last-child td{border-bottom:none}
table.posts .no{font-family:var(--mono);color:var(--muted);font-size:13px}
tr.deleted{background:var(--alarm-soft)}
tr.deleted .title{text-decoration:line-through;text-decoration-color:var(--alarm)}
.badge{font-family:var(--mono);font-size:11px;font-weight:700;border-radius:5px;
  padding:1px 7px;display:inline-block}
.badge.del{background:var(--alarm);color:#fff}
.badge.rep{background:var(--alarm-soft);color:var(--alarm);margin-left:6px}
.cat{font-size:11px;font-weight:700;color:var(--struct);background:#EAF2F6;
  border-radius:5px;padding:2px 6px;white-space:nowrap}

/* ── 필터/검색 ── */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.seg{display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden}
.seg a{padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);
  background:var(--card)}
.seg a.on{background:var(--ink);color:#fff}
.toolbar form{margin-left:auto;display:flex;gap:6px}
.toolbar input{border:1px solid var(--line2);border-radius:9px;padding:7px 12px;
  font-size:14px;font-family:var(--sans);min-width:180px}
.toolbar button{border:1px solid var(--ink);background:var(--ink);color:#fff;
  border-radius:9px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}

/* ── 상세 ── */
.detail{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px}
.detail h2{margin:0 0 4px;font-size:20px;letter-spacing:-.02em}
.detail .meta{font-size:13px;color:var(--muted);font-family:var(--mono);
  margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.detail .body{white-space:pre-wrap;line-height:1.7;font-size:15px}
.empty{color:var(--muted);text-align:center;padding:60px 20px;
  background:var(--card);border:1px dashed var(--line2);border-radius:14px}
.back{font-size:13px;font-family:var(--mono);display:inline-block;margin-bottom:16px}

@media (max-width:560px){
  .brand h1{font-size:20px}
  table.posts .col-author,table.posts .col-date{display:none}
}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand">
      <span class="kicker">Dental Recruit Archive</span>
      <h1>치과 구인글 아카이브</h1>
    </div>
    <nav class="tabs">
      <a href="/" class="{{ 'on' if active=='clinics' }}">반복 치과</a>
      <a href="/posts" class="{{ 'on' if active=='posts' }}">전체 글</a>
      <a href="/posts?status=deleted" class="{{ 'on' if active=='deleted' }}">삭제된 글</a>
    </nav>
  </div>
</header>
<div class="wrap">
{% block body %}{% endblock %}
</div>
</body>
</html>
